# =================================================================
#              TNT Run - Block Removal Configuration              #
# =================================================================

timing:
  # Time, in seconds, before block removal begins after the game starts.
  start-after-seconds: 5
  # Delay, in ticks, before blocks are removed after players step on them.
  remove-delay-ticks: 12
  # How often players are scanned for removable blocks.
  scan-interval-ticks: 1

scanning:
  # How many blocks below a grounded player should be checked.
  depth-on-ground: 2
  # How many blocks below an airborne player should be checked.
  depth-in-air: 6

safety:
  # Save removed blocks during games so arenas can be restored after a crash or forced shutdown.
  persist-snapshots: true
  # Automatically restore saved blocks when the plugin starts again.
  # Keep this enabled if you want crash recovery to happen without manual arena cleanup.
  restore-snapshots-on-startup: true
  # During recovery, only restore blocks where the space is still empty.
  # This helps avoid overwriting blocks placed by an admin, a world reset, or another plugin.
  restore-only-air: true
  # How often recovery data is saved while a game is running.
  # Lower values improve crash safety; higher values slightly reduce disk activity.
  flush-interval-ticks: 5

# List of blocks that are allowed to be removed during gameplay.
removable-blocks:
  - TNT
  - SAND
  - SANDSTONE
  - GRAVEL
  - TERRACOTTA
  - RED_SANDSTONE
  - RED_SAND

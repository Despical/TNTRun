# Choose the storage method for player data. Supported values are flat or mysql.
# Please note that data migration is not supported, and changes will only take effect after a server restart or plugin reload.
database: flat

arena-settings:
  # How often arena game logic should tick, in server ticks.
  # Lower values make games update more often; higher values reduce update frequency.
  tick-period: 5

time-settings:
  # How long, in seconds, a waiting arena can stay idle before sending waiting reminders.
  waiting-time: 300

  # How long, in seconds, the pre-game waiting phase can last.
  pre-game-waiting-time: 120

  # Countdown length, in seconds, after enough players are available to start.
  game-starting-time: 30

  # Countdown length, in seconds, when the arena reaches its maximum player count.
  full-game-starting-time: 15

  # Duration, in seconds, of the ending phase before players are returned/reset.
  ending-time: 10

# If enabled, players will see the TNT Run scoreboard while playing.
# This is the global scoreboard switch; arenas can still disable their own scoreboard separately.
scoreboard-enabled: true

# If enabled, player name tags are hidden during games.
name-tags-hidden: false

double-jumps:
  # Default amount of double jumps given to players without a custom permission.
  default: 5

  # Cooldown, in seconds, before a player can use another double jump.
  delay: 4

  # Permission-based double jump amounts.
  # The number after the last dot is used as the player's double jump amount.
  permissions:
    - tntrun.doublejumps.3
    - tntrun.doublejumps.2
    - tntrun.doublejumps.1

# If enabled, players see an action bar cooldown after using a double jump.
jump-bar: true

# If enabled, the player's experience level can be used as a timer display.
level-bar-timer: false

# If enabled, the leave item removes players from the arena instantly.
instant-leave: false

chat-settings:
  # Whether the plugin should format arena chat using messages.yml formats.
  # If false, chat messages use a simple "<player> message" format.
  enable-formatting: true

  # When enabled, arena chat is isolated from the rest of the server.
  # Players inside arenas only see arena chat, and players outside do not see it.
  separate-chat: true

  # When enabled, players who are actively in a game cannot send chat messages.
  disable-chat-in-game: false

  # When enabled, alive players can also see dead/spectator chat messages.
  dead-chat-visible-to-alive: false

command-settings:
  # When enabled, players who are in an arena can only use commands listed below.
  disable-commands-while-playing: true

  # Commands players may still use while playing.
  # Use command roots such as "msg" to allow all arguments, or subcommands such as "tr leave".
  allowed-commands:
    - "tr leave"
    - "tntrun leave"
    - "tr stats"
    - "tntrun stats"

# If enabled, the plugin checks for newer releases on startup.
update-notifier: true

# Enabling debug mode allows administrators to access advanced troubleshooting commands.
# Keep this disabled on production servers unless you are actively testing or diagnosing an issue.
debug: false

# Event profiling measures how long TNT Run event listeners take to execute.
# Useful for diagnosing lag or slow integrations, but usually not needed during normal gameplay.
event-profiling:
  enabled: false

  # If enabled, every profiled event execution is logged with timing details.
  # This can spam the console heavily, so only enable it for short debugging sessions.
  verbose: false

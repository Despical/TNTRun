# =============================================================== #
#                  TNT Run - Sign Configuration                   #
# =============================================================== #
#                                                                 #
# LINE PLACEHOLDERS:                                              #
#   %state%             : Current state of the arena              #
#   %players%           : Current number of players               #
#   %min_players%       : Minimum players required to start       #
#   %max_players%       : Maximum player capacity                 #
#   %map_name%          : Display name of the arena map           #
#   %map_author%        : Author of the arena map                 #
#   %map_difficulty%    : Difficulty of the arena map             #
#                                                                 #
# SYSTEM MESSAGE PLACEHOLDERS:                                    #
#   %x%                 : Sign block X coordinate                 #
#   %y%                 : Sign block Y coordinate                 #
#   %z%                 : Sign block Z coordinate                 #
#   %direction%         : Direction the sign is facing            #
#                                                                 #
# =============================================================== #

# System messages about the signs.
created: "<#00E676>✔ <#BDBDBD>Arena sign created. <dark_gray>[ <#81D4FA>X: %x%, Y: %y%, Z: %z% <dark_gray>] <#BDBDBD>facing <#29B6F6><bold>%direction%<#BDBDBD>."
removed: "<#00E676>✔ <#BDBDBD>Arena sign removed. <dark_gray>[ <#EF9A9A>X: %x%, Y: %y%, Z: %z% <dark_gray>]<#BDBDBD>."
no-perm-to-break: "<#FF5252>✖ You do not have permission to break this sign."
look-at-a-sign: "<#FF5252>No sign detected! <#BDBDBD>Please look directly at a <#FFB74D>Sign block <#BDBDBD>and try again."

# Display text used for each arena state on signs.
game-states:
  waiting: "<#00E676><bold>WAITING"
  starting: "<#FFAB00><bold>STARTING"
  in-game: "<#FF5252><bold>IN GAME"
  full-game: "<#D50000><bold>FULL"
  ending: "<#9E9E9E><bold>ENDING"
  restarting: "<#607D8B><bold>REBOOTING"
  inactive: "<#B0BEC5><bold>MAINTENANCE"

# Sign layout, from top line to bottom line.
lines:
  - "<gradient:#FF1744:#D50000><bold>TNT Run</gradient>"
  - "%state%"
  - "<gradient:#00E676:#29B6F6><bold>%map_name%</bold></gradient>"
  - "<#455A64>[ <#CFD8DC>%players% <#455A64>/ <#CFD8DC>%max_players% <#455A64>]"
